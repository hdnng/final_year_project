<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduVision AI</title>
    <link rel="stylesheet" href="/frontend/css/login.css">

    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="login-wrapper">

        <div class="login-card">

            <div class="login-header">
                <div class="logo">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <h2>EduVision AI</h2>
            </div>

            <div class="login-body">

                <h3>Chào mừng trở lại</h3>

                <form id="loginForm">

                    <label>Email</label>
                    <div class="input-group">
                        <i class="fa-regular fa-envelope"></i>
                        <input id="email" type="email" placeholder="email@truong.edu.vn">
                    </div>

                    <label>Mật khẩu</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input id="password" type="password" placeholder="Nhập mật khẩu">
                        <i class="fa-regular fa-eye eye"></i>
                    </div>

                    <a href="#" class="forgot">Quên mật khẩu?</a>

                    <button class="btn-login">
                        Đăng nhập <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
                <script src="/frontend/js/login.js"></script>
                <p class="register">
                    Chưa có tài khoản?
                    <a href="/frontend/register.html">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
