<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng ký - EduVision AI</title>
    <link rel="stylesheet" href="/frontend/css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- LEFT -->
        <div class="left">
            <div class="logo">
                <i class="fa-solid fa-graduation-cap"></i>
                EduVision AI
            </div>

            <div class="image-box">
                <img src="ai.png" alt="">
            </div>

            <h2>
                Kiến tạo tương lai cùng <span>Trí tuệ Nhân tạo</span>
            </h2>

            <p>
                Tham gia cộng đồng học tập thông minh nhất hiện nay.
            </p>
        </div>

        <!-- RIGHT -->
        <div class="right">

            <h2>Tạo tài khoản mới</h2>
            <p class="sub">
                Bắt đầu hành trình học tập của bạn chỉ trong vài phút.
            </p>

            <form id="registerForm">

                <label>Họ và Tên</label>
                <div class="input-box">
                    <i class="fa-regular fa-user"></i>
                    <input id="name" type="text" placeholder="Nguyễn Văn A">
                </div>

                <label>Email</label>
                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>
                    <input id="email" type="email" placeholder="example@email.com">
                </div>

                <div class="row">

                    <div class="col">
                        <label>Mật khẩu</label>
                        <div class="input-box">
                            <i class="fa-solid fa-lock"></i>
                            <input id="password" type="password" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="col">
                        <label>Xác nhận</label>
                        <div class="input-box">
                            <i class="fa-solid fa-shield-halved"></i>
                            <input id="confirm_password" type="password" placeholder="••••••••">
                        </div>
                    </div>

                </div>

                <button type="submit" class="btn">
                    Đăng ký tài khoản
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

            </form>

            <div class="login-link">
                Đã có tài khoản?
                <a href="/frontend/login.html">Đăng nhập ngay</a>
            </div>

        </div>

    </div>
    <script src="/frontend/js/register.js"></script>
</body>

</html>
